name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Smoke test binary
        run: "./target/${{ matrix.target }}/release/fastaguard --schema > /dev/null"

      - name: Package artifact
        run: scripts/package_release_artifact.sh "${{ matrix.target }}" "${GITHUB_REF_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: fastaguard-${{ github.ref_name }}-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes_file="docs/releases/${GITHUB_REF_NAME}.md"
          gh release create "${GITHUB_REF_NAME}" \
            dist/*.tar.gz \
            dist/SHA256SUMS \
            --verify-tag \
            --title "FastaGuard ${GITHUB_REF_NAME}" \
            --notes-file "${notes_file}"
